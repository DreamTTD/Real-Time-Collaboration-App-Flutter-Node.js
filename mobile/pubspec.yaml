name: realtime_collaboration
description: Real-time collaboration platform using Flutter and Node.js
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.18.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  socket_io_client: ^2.0.0
  http: ^1.1.0
  intl: ^0.19.0
  curved_navigation_bar: ^1.0.3
  badges: ^3.1.1
  flutter_markdown: ^0.6.13
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  uuid: ^4.0.0
  permission_handler: ^11.4.4
  image_picker: ^1.0.4
  file_picker: ^5.5.0
  dio: ^5.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
